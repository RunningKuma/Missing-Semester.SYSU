    <text x="960" y="132" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="28" font-weight="700" fill="#0A4C40">Hephaestus</text>
    <text x="960" y="152" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#397A69">implementation specialist</text>

    <rect x="930" y="178" width="296" height="70" rx="20" fill="#FAF8FF"/>
