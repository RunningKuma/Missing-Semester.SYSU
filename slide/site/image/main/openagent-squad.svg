    <rect x="930" y="264" width="296" height="70" rx="20" fill="#F7FBFF"/>
    <text x="960" y="304" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="28" font-weight="700" fill="#1F4D7A">Librarian</text>
    <text x="960" y="324" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#4C739B">AGENTS.md / memory upkeep</text>
