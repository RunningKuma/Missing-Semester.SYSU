<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B2744" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="420" rx="30" fill="#F8FBFF"/>
  <text x="58" y="56" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="28" font-weight="700" fill="#1D3B5A">
    AI moves from the terminal to the message stream
  </text>
  <text x="106" y="86" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#4D8A7D">
    channels
  </text>
  <text x="492" y="86" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#59718C">
    gateway
  </text>
  <text x="980" y="86" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#B37A4D">
    surfaces
  </text>

  <g filter="url(#shadow)">
    <rect x="56" y="92" width="200" height="52" rx="18" fill="#E8FBF5"/>
    <rect x="56" y="162" width="200" height="52" rx="18" fill="#EAF2FB"/>
    <rect x="56" y="232" width="200" height="52" rx="18" fill="#FFF3E8"/>
    <rect x="56" y="302" width="200" height="52" rx="18" fill="#FAF8FF"/>

    <text x="96" y="126" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="24" font-weight="700" fill="#0A4C40">WhatsApp</text>
    <text x="96" y="196" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="24" font-weight="700" fill="#16324F">Telegram</text>
    <text x="96" y="266" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="24" font-weight="700" fill="#8A3E08">Discord</text>
    <text x="96" y="336" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="24" font-weight="700" fill="#5A44A3">iMessage</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="352" y="78" width="380" height="278" rx="28" fill="#EAF2FB"/>
    <text x="386" y="126" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="38" font-weight="700" fill="#16324F">OpenClaw</text>
    <text x="386" y="160" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="24" fill="#365D82">multi-channel gateway</text>

    <rect x="386" y="188" width="110" height="36" rx="12" fill="#D7E6F6"/>
    <rect x="514" y="188" width="108" height="36" rx="12" fill="#D7E6F6"/>
    <rect x="640" y="188" width="66" height="36" rx="12" fill="#D7E6F6"/>
    <text x="406" y="212" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#25496C">channels</text>
    <text x="536" y="212" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#25496C">sessions</text>
    <text x="660" y="212" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" font-weight="700" fill="#25496C">nodes</text>

    <text x="386" y="258" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="22" fill="#365D82">- routes every sender into an isolated context</text>
    <text x="386" y="290" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="22" fill="#365D82">- stays online even when you are away from the IDE</text>
    <text x="386" y="322" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="22" fill="#365D82">- becomes a control plane for tools, people, and devices</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="838" y="84" width="372" height="106" rx="24" fill="#FFF3E8"/>
    <text x="868" y="126" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="30" font-weight="700" fill="#8A3E08">Pi agent path</text>
    <text x="868" y="156" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="20" fill="#A0622E">default coding brain today</text>
    <text x="868" y="182" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#A0622E">RPC mode, per-sender sessions</text>

    <rect x="838" y="226" width="176" height="114" rx="24" fill="#E8FBF5"/>
    <text x="868" y="266" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="30" font-weight="700" fill="#0A4C40">Nodes</text>
    <text x="868" y="294" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#397A69">camera</text>
    <text x="946" y="294" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#397A69">voice</text>
    <text x="868" y="320" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#397A69">location</text>
    <text x="968" y="320" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#397A69">canvas</text>

    <rect x="1034" y="226" width="176" height="114" rx="24" fill="#FAF8FF"/>
    <text x="1060" y="266" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="30" font-weight="700" fill="#5A44A3">Web UI</text>
    <text x="1060" y="294" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#7A67B7">remote access</text>
    <text x="1060" y="320" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="18" fill="#7A67B7">mac app control</text>
  </g>

  <text x="58" y="388" font-family="JetBrains Mono, Ubuntu, sans-serif" font-size="22" fill="#59718C">
    Message-first, self-hosted, always-on: this is a different interface for AI work.
  </text>
</svg>
